# =============================================================
# Render Blueprint - render.yaml
# =============================================================
# WHAT THIS DOES:
# Tells Render how to deploy your service. Render reads this file
# to understand what type of service to create and how to configure it.
#
# NOTE: Environment variables with 'sync: false' must be set manually
# in the Render dashboard (they contain secrets).
#
# CREDENTIALS ARE NOW STORED IN SUPABASE POSTGRES (not on disk).
# This means credentials survive every redeploy forever.
# =============================================================

services:
  - type: web
    name: n8n-calendar-automation
    runtime: image
    image:
      # This pulls the Docker image from your Docker Hub repository
      url: docker.io/${{ secrets.DOCKER_USERNAME }}/n8n-calendar-automation:latest
    plan: starter          # Render plan tier (starter, standard, pro)
    region: oregon         # Deploy region
    numInstances: 1

    envVars:
      # --- n8n Configuration ---
      - key: N8N_BASIC_AUTH_ACTIVE
        value: "true"
      - key: N8N_PORT
        value: "5678"
      - key: N8N_PROTOCOL
        value: "https"
      - key: N8N_DIAGNOSTICS_ENABLED
        value: "false"
      - key: GENERIC_TIMEZONE
        value: "Asia/Kolkata"
      - key: N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS
        value: "false"   # must be false when there is no persistent disk

      # --- n8n URL (set these manually in Render dashboard) ---
      - key: N8N_HOST
        sync: false      # e.g. your-service.onrender.com  (no https://)
      - key: WEBHOOK_URL
        sync: false      # e.g. https://your-service.onrender.com/

      # --- Encryption key (CRITICAL - generate once, never change) ---
      # Run this to generate: openssl rand -hex 32
      # If you change this, all saved credentials become unreadable!
      - key: N8N_ENCRYPTION_KEY
        sync: false

      # --- Database - Supabase Postgres ---
      # Credentials survive every redeploy because they live in the DB, not on disk
      - key: DB_TYPE
        value: "postgresdb"
      - key: DB_POSTGRESDB_HOST
        sync: false      # from Supabase: Project Settings > Database > Host
      - key: DB_POSTGRESDB_PORT
        value: "5432"
      - key: DB_POSTGRESDB_DATABASE
        value: "postgres"
      - key: DB_POSTGRESDB_USER
        value: "postgres"
      - key: DB_POSTGRESDB_PASSWORD
        sync: false      # the password you set when creating the Supabase project
      - key: DB_POSTGRESDB_SCHEMA
        value: "public"

      # --- Secrets (must be set in Render Dashboard manually) ---
      - key: N8N_BASIC_AUTH_USER
        sync: false
      - key: N8N_BASIC_AUTH_PASSWORD
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false

    # NOTE: No disk section here anymore.
    # Previously the disk stored credentials, but it caused them to be wiped
    # on every redeploy. Now Supabase Postgres stores everything permanently.