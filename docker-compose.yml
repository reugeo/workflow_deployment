# =============================================================
# Docker Compose - Local Development Setup
# =============================================================
# WHAT THIS DOES:
# Runs n8n locally on your machine for testing before deployment.
# Uses the Dockerfile in this repo (not the plain n8n image).
#
# HOW TO USE:
# 1. Copy .env.example to .env and fill in your values
# 2. Run: docker-compose up --build
# 3. Open: http://localhost:5678
# =============================================================

version: "3.8"

services:
  n8n:
    # Build from our custom Dockerfile (not from Docker Hub directly)
    build:
      context: .
      dockerfile: Dockerfile
    container_name: n8n-calendar-automation

    ports:
      - "5678:5678"

    environment:
      # --- n8n Authentication ---
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD}

      # --- n8n Host Configuration ---
      - N8N_HOST=${N8N_HOST:-localhost}
      - N8N_PORT=5678
      - N8N_PROTOCOL=${N8N_PROTOCOL:-http}
      - WEBHOOK_URL=${WEBHOOK_URL:-http://localhost:5678}

      # --- n8n Settings ---
      - N8N_DIAGNOSTICS_ENABLED=false
      - GENERIC_TIMEZONE=${GENERIC_TIMEZONE:-Asia/Kolkata}
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=true

      # --- API Keys (injected from .env file locally, from GitHub Secrets in CI/CD) ---
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GEMINI_API_KEY=${GEMINI_API_KEY}

    volumes:
      # Persist n8n data between container restarts
      - n8n_data:/home/node/.n8n

    restart: unless-stopped

volumes:
  n8n_data: